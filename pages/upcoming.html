<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../globals.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <title>Upcoming Races</title>
    <style>
        .page-header {
            text-align: center;
            margin-top: 120px;
            padding: 40px 20px;
        }
        
        .page-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            color: var(--hero-text);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        
        .page-header p {
            font-family: 'Inter', sans-serif;
            color: #b0b0b0;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .races-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 80px auto;
            padding: 0 20px;
        }

        .race-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .race-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .race-card .icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .race-card h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            color: #ffffff;
        }

        .race-card p {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #d1d1d1;
            margin: 5px 0;
        }
        
        .sprint-badge {
            display: inline-block;
            background: rgba(225, 6, 0, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-top: 20px;
            border: 1px solid rgba(225, 6, 0, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/pages/bet.html">Bets</a>
            <a href="/pages/upcoming.html" class="active">Upcoming Races</a>
            <a href="/pages/betgames.html">All Games</a>
            <a href="/pages/about.html">About</a>
        </div>
        <div class="amount">{amount}</div>
    </nav>

    <div class="page-header">
        <h1>Upcoming Races</h1>
        <p>Check out the latest schedule and plan your bets!</p>
    </div>
    
    <div id="upcoming-races" class="races-grid"></div>

    <script src="../upcomingraces.js"></script>
    <script>
        const container = document.getElementById("upcoming-races");

        Object.values(upcoming_races).forEach(race => {
            const div = document.createElement("div");
            div.className = "race-card";
            
            const sprintBadge = race.sprint 
                ? `<div class="sprint-badge">🏁 Sprint Weekend</div>` 
                : "";
            
            div.innerHTML = `
                <div class="icon">📍</div>
                <h3>${race.name}</h3>
                <p><strong>Date:</strong> ${race.date}</p>
                <p><strong>Location:</strong> ${race.location}</p>
                ${sprintBadge}
            `;
            container.appendChild(div);
        });
    </script>
</body>
</html>
