<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="globals.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <title>Upcoming Races</title>
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/pages/bet.html">Bets</a>
            <a href="/pages/upcoming.html" class="active">Upcoming Races</a>
            <a href="/pages/about.html">About</a>
        </div>
    </nav>

    <div style="margin-top: 120px; text-align: center;">
        <h1 id="title" style="font-size: 4rem; text-shadow: none;">Upcoming Races</h1>
        <p style="color: #555; margin-top: -10px; font-size: 1.2rem;">Check out the latest schedule and plan your bets!</p>
    </div>
    
    <div id="upcoming-races" class="features"></div>

    <script src="upcomingraces.js"></script>
    <script>
        const container = document.getElementById("upcoming-races");

        Object.values(upcoming_races).forEach(race => {
            const div = document.createElement("div");
            div.className = "feature-card";
            
            const sprintBadge = race.sprint 
                ? `<p style="color: var(--accent-color); font-weight: 800; margin-top: 10px;">🏁 Sprint Weekend</p>` 
                : "";
            
            div.innerHTML = `
                <div class="icon">📍</div>
                <h3>${race.name}</h3>
                <p style="margin-bottom: 5px;"><strong>Date:</strong> ${race.date}</p>
                <p><strong>Location:</strong> ${race.location}</p>
                ${sprintBadge}
            `;
            container.appendChild(div);
        });
    </script>
</body>
</html>
